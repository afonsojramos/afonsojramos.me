name = "afonsojramos-me"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2025-03-25"

[assets]
binding = "ASSETS"
directory = "./dist"

[[d1_databases]]
binding = "VIEWS_DB"
database_name = "afonsojramos-me-views"
database_id = "REPLACE_AFTER_WRANGLER_D1_CREATE"
migrations_dir = "./migrations"

[observability]
enabled = true

[env.production]
name = "afonsojramos-me"
route = { pattern = "afonsojramos.me", custom_domain = true }

[env.preview]
name = "afonsojramos-me-preview"
