packages:
  - "."

packageExtensions:
  "@astrojs/cloudflare@*":
    dependencies:
      prismjs: "1.30.0"

# pnpm 11 reads allowBuilds; onlyBuiltDependencies kept for older tooling.
allowBuilds:
  "@nubjs/nub": true
  esbuild: true
  sharp: true
  workerd: true

onlyBuiltDependencies:
  - "@nubjs/nub"
  - esbuild
  - sharp
  - workerd
